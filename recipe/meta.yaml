{% set name = "regi0" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/regi0-{{ version }}.tar.gz
  sha256: 038008a34cb74beda7b788ba6d8e9cc5db686fc6debfc238e533954f8ba0ac2d

build:
  entry_points:
    - regi0 = regi0.cli.cli:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - tomli
  run:
    - appdirs
    - click
    - fiona
    - geopandas >=0.10
    - numpy >=1.15
    - openpyxl
    - pandas
    - pygeos
    - python >={{ python_min }},<3.10
    - rapidfuzz
    - rasterio >=1.2
    - rasterstats
    - requests
    - scipy

test:
  imports:
    - regi0
  commands:
    - pip check
    - regi0 --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/PEM-Humboldt/regi0
  summary: A Python toolkit to complement and verify biological records.
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - marcelovilla
